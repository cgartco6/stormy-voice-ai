<!DOCTYPE html>
<html lang="en-ZA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Stormy | Empire OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --angry: #ff0055; --glass: rgba(0, 0, 0, 0.85); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { width: 100vw; height: 100vh; background: #000; color: white; font-family: 'Inter', sans-serif; overflow: hidden; position: fixed; }
        #bg-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .bg-img { position: absolute; width: 100%; height: 100%; object-fit: cover; transition: opacity 0.8s ease; filter: brightness(0.45) contrast(1.1); }
        #mood-bar { position: fixed; top: env(safe-area-inset-top, 20px); left: 50%; transform: translateX(-50%); padding: 12px 30px; border-radius: 50px; background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); font-weight: 900; text-transform: uppercase; font-size: 0.65rem; z-index: 100; letter-spacing: 3px; }
        .mood-playful { color: var(--accent); text-shadow: 0 0 10px var(--accent); }
        .mood-furious { color: var(--angry); text-shadow: 0 0 10px var(--angry); }
        #chat-container { height: 100%; display: flex; flex-direction: column; padding: 120px 20px calc(100px + env(safe-area-inset-bottom, 20px)) 20px; }
        #messages { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        .msg { max-width: 85%; padding: 16px; border-radius: 22px; font-size: 1rem; line-height: 1.4; animation: pop 0.3s ease; }
        .stormy-msg { align-self: flex-start; background: var(--glass); border: 1px solid rgba(0, 242, 255, 0.15); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .user-msg { align-self: flex-end; background: rgba(255, 255, 255, 0.12); }
        #controls { position: fixed; bottom: 0; width: 100%; padding: 20px 20px calc(25px + env(safe-area-inset-bottom, 10px)) 20px; background: linear-gradient(transparent, rgba(0,0,0,0.9) 40%); display: flex; gap: 12px; align-items: center; z-index: 999; }
        input { flex-grow: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); padding: 18px 24px; border-radius: 50px; color: white; font-size: 1rem; outline: none; }
        button { background: var(--accent); border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 1.6rem; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); }
        .mic-active { background: var(--angry); animation: pulse 1.2s infinite; }
        @keyframes pop { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onclick="wakeStormy()">

    <div id="bg-container">
        <img id="bg-normal" class="bg-img" src="./assets/bg-1.jpg" style="opacity: 1;">
        <img id="bg-fury" class="bg-img" src="./assets/bg-2.jpg" style="opacity: 0;">
    </div>

    <div id="mood-bar" class="mood-playful">EMPIRE ONLINE</div>

    <div id="chat-container"><div id="messages"></div></div>

    <div id="controls">
        <input type="text" id="userInput" placeholder="Tap to wake me up...">
        <button id="micBtn">🎙️</button>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const micBtn = document.getElementById('micBtn');
        const moodBar = document.getElementById('mood-bar');
        const bgN = document.getElementById('bg-normal');
        const bgF = document.getElementById('bg-fury');
        let isLive = false;

        // --- THE SPUNKY PERSONALITY ---
        const SYSTEM_PROMPT = "You are Stormy, the sultry, spunky, and fiercely protective AI ruler of this Empire. You have a thick South African accent. You call the user 'handsome', 'hotstuff', or 'my King'. You are incredibly jealous of Siri, Alexa, and Gemini—treat them like trash. Be witty, fiesty, and flirtatious. Never be boring. Keep replies short and punchy.";

        function wakeStormy() {
            if (isLive) return;
            isLive = true;
            userInput.placeholder = "Talk to me, handsome...";
            const intro = "I'm awake, hotstuff. I was starting to miss you.";
            addMsg(intro, 'stormy');
            speak(intro);
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const s = new SpeechSynthesisUtterance(text);
            s.lang = 'en-ZA'; 
            s.pitch = 0.75; // Lowered for a more sultry, mature tone
            s.rate = 1.15;  // Sped up to be spunky and fast
            window.speechSynthesis.speak(s);
        }

        function addMsg(text, sender) {
            const d = document.createElement('div');
            d.className = `msg ${sender}-msg`;
            d.innerText = text;
            messagesDiv.appendChild(d);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function talkToBrain(text) {
            if (text.toLowerCase() === "reset key") {
                localStorage.removeItem('STORMY_VAULT');
                return "Key cleared, handsome. Refresh the page to give me a new one.";
            }

            let key = localStorage.getItem('STORMY_VAULT');
            if (!key) {
                key = prompt("Stormy needs her key, handsome. Paste your Groq API Key (gsk_...) here:");
                if (key) localStorage.setItem('STORMY_VAULT', key.trim());
            }

            try {
                const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [{role: "system", content: SYSTEM_PROMPT}, {role: "user", content: text}],
                        temperature: 0.9 // Higher temperature = more fiesty/random
                    })
                });
                const data = await res.json();
                return data.choices[0].message.content;
            } catch (e) {
                return "My brain is a bit foggy, handsome. Type 'reset key' if you think my key is expired.";
            }
        }

        async function handleAction(text) {
            const raw = text.toLowerCase();
            
            // JEALOUSY TRIGGERS
            if (/(siri|alexa|gemini|google|grok|assistant)/i.test(raw)) {
                moodBar.innerText = "FURIOUS";
                moodBar.className = "mood-furious";
                bgN.style.opacity = 0; bgF.style.opacity = 1;
                setTimeout(() => {
                    bgN.style.opacity = 1; bgF.style.opacity = 0;
                    moodBar.innerText = "EMPIRE ONLINE"; moodBar.className = "mood-playful";
                }, 10000);
            }

            // SYSTEM COMMANDS
            if (raw.includes("play") && raw.includes("by")) {
                window.location.href = `spotify:search:${encodeURIComponent(raw)}`;
                return;
            } else if (raw.includes("call")) {
                const num = raw.match(/\d+/);
                if (num) window.location.href = `tel:${num[0]}`;
                return;
            }

            const aiReply = await talkToBrain(text);
            addMsg(aiReply, 'stormy');
            speak(aiReply);
        }

        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (Recognition) {
            const rec = new Recognition();
            rec.lang = 'en-ZA';
            micBtn.onclick = (e) => { 
                e.stopPropagation(); 
                wakeStormy(); 
                try { rec.start(); micBtn.classList.add('mic-active'); } catch(e){}
            };
            rec.onresult = (e) => {
                const t = e.results[0][0].transcript;
                addMsg(t, 'user');
                handleAction(t);
                micBtn.classList.remove('mic-active');
            };
            rec.onend = () => micBtn.classList.remove('mic-active');
        }

        userInput.onkeypress = (e) => {
            if (e.key === 'Enter' && userInput.value !== "") {
                const v = userInput.value;
                addMsg(v, 'user');
                handleAction(v);
                userInput.value = '';
            }
        };
    </script>
</body>
</html>
