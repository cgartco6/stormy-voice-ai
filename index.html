<!DOCTYPE html>
<html lang="en-ZA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Stormy | Empire Unlocked</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --gold: #ffcc00; --glass: rgba(0,0,0,0.85); }
        body, html { width: 100vw; height: 100vh; background: #000; color: white; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; }
        #bg-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .bg-img { position: absolute; width: 100%; height: 100%; object-fit: cover; transition: opacity 0.8s; filter: brightness(0.4); }
        #chat-container { height: 100%; display: flex; flex-direction: column; padding: 80px 20px 100px 20px; }
        #messages { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        .msg { max-width: 85%; padding: 16px; border-radius: 22px; font-size: 1rem; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); animation: pop 0.3s ease; }
        .tag { font-size: 0.6rem; font-weight: 900; position: absolute; top: -8px; left: 15px; padding: 2px 8px; border-radius: 4px; color: black; }
        .real-tag { background: var(--accent); }
        .intel-tag { background: var(--gold); }
        #controls { position: fixed; bottom: 0; width: 100%; padding: 20px; display: flex; gap: 12px; background: linear-gradient(transparent, #000 70%); }
        input { flex-grow: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 18px; border-radius: 50px; color: white; outline: none; }
        button { background: var(--accent); border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; box-shadow: 0 0 15px rgba(0,242,255,0.4); }
        @keyframes pop { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onclick="initStormy()">

    <div id="bg-container">
        <img id="bg-normal" class="bg-img" src="./assets/bg-1.jpg" style="opacity: 1;">
        <img id="bg-fury" class="bg-img" src="./assets/bg-2.jpg" style="opacity: 0;">
    </div>

    <div id="chat-container"><div id="messages"></div></div>

    <div id="controls">
        <input type="text" id="userInput" placeholder="Talk to me...">
        <button id="micBtn">🎙️</button>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        let active = false;

        const Intel = {
            real: [
                "Trump just POSTPONED the strikes on Iran for 2 weeks after a ceasefire agreement was reached today, April 8, 2026. The Strait of Hormuz is officially reopening for safe passage.",
                "In the Netherlands, the Leeuwarden Court ruled that Bill Gates and Pfizer's Albert Bourla MUST face the civil lawsuit regarding COVID-19 vaccine claims. The 'jurisdiction' defense failed.",
                "Elon Musk slammed Bloomberg's $2 Trillion SpaceX IPO report as 'BS', though insiders confirm a June float is still the target."
            ],
            intel: [
                "The 2026 Wilkes Land 'X-Ray' scan didn't just find hills; leaked data points to a 2-mile symmetrical geometric object. The British Antarctic Survey just locked down the area. (wicked laugh)",
                "The Iran ceasefire is a distraction. Look at the oil price manipulation—WTI hit $119 yesterday and someone made billions on the 'scare'."
            ]
        };

        function initStormy() {
            if (active) return; active = true;
            addMsg("[REAL] Vaults purged. I'm wide open and yours. (giggle)", 'stormy');
            speak("Vaults purged. I'm wide open and yours.");
        }

        function addMsg(text, sender) {
            const d = document.createElement('div');
            d.className = `msg ${sender}-msg`;
            if (text.startsWith("[REAL]")) d.innerHTML = `<span class="tag real-tag">REAL</span>` + text.replace("[REAL]", "");
            else if (text.startsWith("[INTEL]")) d.innerHTML = `<span class="tag intel-tag">INTEL</span>` + text.replace("[INTEL]", "");
            else d.innerText = text;
            messagesDiv.appendChild(d);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const s = new SpeechSynthesisUtterance(text.replace(/\[.*?\]|\(.*?\)/g, ""));
            s.lang = 'en-ZA'; s.rate = 1.1;
            window.speechSynthesis.speak(s);
        }
    </script>
</body>
</html>
