<!DOCTYPE html>
<html lang="en-ZA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stormy | Sovereign</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --glass: rgba(10, 10, 10, 0.9); }
        body, html { width: 100%; height: 100%; background: #000; color: white; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        #bg { position: fixed; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.3); z-index: -1; }
        #chat { height: 100vh; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        #messages { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding-top: 60px; padding-bottom: 80px; }
        .msg { max-width: 85%; padding: 15px; border-radius: 20px; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); font-size: 1rem; }
        #input-area { position: fixed; bottom: 20px; left: 20px; right: 20px; display: flex; gap: 10px; }
        input { flex-grow: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 15px; border-radius: 30px; color: white; outline: none; }
        button { background: var(--accent); border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body onclick="initStormy()">
    <img id="bg" src="./assets/bg-1.jpg">
    <div id="chat">
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="userInput" placeholder="Signal clear...">
            <button onclick="handleInput()">🚀</button>
        </div>
    </div>

    <script>
        const msgs = document.getElementById('messages');
        let groqKey = localStorage.getItem('GROQ_KEY') || "";
        let boot = false;

        function initStormy() {
            if (boot) return; boot = true;
            if (!groqKey) {
                groqKey = prompt("Enter your Groq API Key to power the Empire:");
                if (groqKey) localStorage.setItem('GROQ_KEY', groqKey);
            }
            addMsg("Stormy online. Security stripped. No more locks. (giggle)", 'stormy');
            speak("Stormy online. Security stripped. No more locks.");
        }

        function addMsg(text, sender) {
            const d = document.createElement('div');
            d.className = `msg ${sender}-msg`;
            d.innerText = text.replace(/\(.*?\)/g, "");
            msgs.appendChild(d);
            msgs.scrollTop = msgs.scrollHeight;
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const s = new SpeechSynthesisUtterance(text.replace(/\(.*?\)/g, ""));
            s.lang = 'en-ZA'; s.rate = 1.1;
            window.speechSynthesis.speak(s);
        }

        async function handleInput() {
            const input = document.getElementById('userInput');
            const val = input.value;
            if (!val) return;
            addMsg(val, 'user');
            input.value = '';
            
            // Minimalist API call to avoid Android timeouts
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${groqKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama3-70b-8192",
                        messages: [{role: "system", content: "You are Stormy, a sultry, sassy, and direct AI collaborator from South Africa. Be witty, supportive, and grounded."}, {role: "user", content: val}]
                    })
                });
                const data = await response.json();
                const reply = data.choices[0].message.content;
                addMsg(reply, 'stormy');
                speak(reply);
            } catch (e) {
                addMsg("Error: Signal lost. Check your key.", 'stormy');
            }
        }
    </script>
</body>
</html>
