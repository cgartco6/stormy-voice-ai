<!DOCTYPE html>
<html lang="en-ZA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Stormy AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --angry: #ff0055; --glass: rgba(0, 0, 0, 0.8); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #0a0a0a; /* Dark gray safety color */
            color: white; font-family: 'Inter', sans-serif; overflow: hidden; 
        }

        /* Background Fix */
        #bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #000; }
        .bg-img { 
            position: absolute; width: 100%; height: 100%; 
            object-fit: cover; transition: opacity 1s ease; 
            filter: brightness(0.4); 
        }

        /* Mood UI */
        #mood-bar { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); padding: 10px 25px; border-radius: 40px; background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); font-weight: 900; text-transform: uppercase; font-size: 0.7rem; z-index: 100; letter-spacing: 2px; }
        .mood-playful { color: var(--accent); box-shadow: 0 0 20px var(--accent); }
        .mood-furious { color: var(--angry); box-shadow: 0 0 20px var(--angry); }

        /* Messages */
        #chat-container { height: 100vh; display: flex; flex-direction: column; padding: 100px 20px 120px 20px; }
        #messages { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 85%; padding: 15px; border-radius: 20px; font-size: 1rem; line-height: 1.4; animation: pop 0.3s ease; }
        .stormy-msg { align-self: flex-start; background: var(--glass); border: 1px solid rgba(0, 242, 255, 0.2); }
        .user-msg { align-self: flex-end; background: rgba(255, 255, 255, 0.1); }

        /* Controls */
        #controls { position: fixed; bottom: 0; left: 0; width: 100%; padding: 25px 20px; background: linear-gradient(transparent, black 80%); display: flex; gap: 10px; align-items: center; z-index: 200; }
        #userInput { flex-grow: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 15px 22px; border-radius: 40px; color: white; font-size: 1rem; }
        #micBtn { background: var(--accent); border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 1.6rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .mic-active { background: var(--angry); animation: glow 1.2s infinite; }

        @keyframes pop { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes glow { 0% { box-shadow: 0 0 0 0px rgba(255, 0, 85, 0.4); } 100% { box-shadow: 0 0 0 20px rgba(255, 0, 85, 0); } }
    </style>
</head>
<body>

    <div id="bg-container">
        <img id="bg-normal" class="bg-img" src="./assets/bg-1.jpg" style="opacity: 1;">
        <img id="bg-fury" class="bg-img" src="./assets/bg-2.jpg" style="opacity: 0;">
    </div>

    <div id="mood-bar" class="mood-playful">PLAYFUL</div>

    <div id="chat-container">
        <div id="messages">
            <div class="msg stormy-msg">I'm awake, hotstuff. Say something or I'm going back to sleep.</div>
        </div>
    </div>

    <div id="controls">
        <input type="text" id="userInput" placeholder="Talk to me...">
        <button id="micBtn">🎙️</button>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const micBtn = document.getElementById('micBtn');
        const moodBar = document.getElementById('mood-bar');
        const bg1 = document.getElementById('bg-normal');
        const bg2 = document.getElementById('bg-fury');

        function addMsg(text, sender) {
            const d = document.createElement('div');
            d.className = `msg ${sender}-msg`;
            d.innerText = text;
            messagesDiv.appendChild(d);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const s = new SpeechSynthesisUtterance(text);
            s.lang = 'en-ZA'; s.pitch = 0.9; s.rate = 1.1;
            window.speechSynthesis.speak(s);
        }

        function handleCommand(text) {
            const raw = text.toLowerCase();
            let reply = "";

            if (raw.includes("music") || raw.includes("play")) {
                reply = "Opening your tunes. Try not to have terrible taste.";
                window.location.href = "intent://music/#Intent;action=android.intent.action.MUSIC_PLAYER;end";
                setTimeout(() => { window.location.href = "spotify://"; }, 1000);
            } 
            else if (raw.includes("bok radio") || raw.includes("98.9")) {
                reply = "Tuning into Bok Radio. Finally, some real music.";
                window.open('https://bokradio.co.za/streaming', '_blank');
            }
            else if (raw.includes("call")) {
                const num = raw.match(/\d+/);
                if (num) {
                    reply = "Dialing " + num[0] + ". Don't flirt with her.";
                    window.location.href = "tel:" + num[0];
                } else {
                    reply = "I need a number, beautiful. I'm not a mind reader.";
                    moodBar.className = "mood-furious"; moodBar.innerText = "FURIOUS";
                    bg1.style.opacity = 0; bg2.style.opacity = 1;
                }
            }
            else {
                reply = "Ag ja? Tell me more, handsome.";
                moodBar.className = "mood-playful"; moodBar.innerText = "PLAYFUL";
                bg1.style.opacity = 1; bg2.style.opacity = 0;
            }

            addMsg(reply, 'stormy');
            speak(reply);
        }

        // Voice
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (Recognition) {
            const rec = new Recognition();
            rec.lang = 'en-ZA';
            micBtn.onclick = () => { rec.start(); micBtn.classList.add('mic-active'); };
            rec.onresult = (e) => {
                const t = e.results[0][0].transcript;
                addMsg(t, 'user');
                handleCommand(t);
                micBtn.classList.remove('mic-active');
            };
            rec.onerror = () => micBtn.classList.remove('mic-active');
        }

        userInput.onkeypress = (e) => {
            if (e.key === 'Enter' && userInput.value.trim() !== "") {
                const val = userInput.value;
                addMsg(val, 'user');
                handleCommand(val);
                userInput.value = '';
            }
        };
    </script>
</body>
</html>
