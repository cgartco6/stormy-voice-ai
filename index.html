<!DOCTYPE html>
<html lang="en-ZA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Stormy AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --angry: #ff0055; --glass: rgba(0, 0, 0, 0.85); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Inter', sans-serif; background: #000; color: white; overflow: hidden; }
        
        #bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .bg-img { position: absolute; width: 100%; height: 100%; object-fit: cover; transition: opacity 1s ease; filter: brightness(0.4); }

        #mood-bar { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); padding: 12px 30px; border-radius: 50px; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); font-weight: 900; text-transform: uppercase; font-size: 0.7rem; z-index: 100; letter-spacing: 3px; }
        .mood-playful { color: var(--accent); box-shadow: 0 0 20px var(--accent); }
        .mood-jealous { color: #ffae00; box-shadow: 0 0 20px #ffae00; }
        .mood-furious { color: var(--angry); box-shadow: 0 0 20px var(--angry); }

        #chat-container { height: 100vh; display: flex; flex-direction: column; padding: 110px 20px 110px 20px; }
        #messages { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 85%; padding: 15px; border-radius: 20px; font-size: 1rem; line-height: 1.4; }
        .stormy-msg { align-self: flex-start; background: var(--glass); border: 1px solid rgba(0, 242, 255, 0.2); border-bottom-left-radius: 4px; }
        .user-msg { align-self: flex-end; background: rgba(255, 255, 255, 0.1); border-bottom-right-radius: 4px; }

        #controls { position: fixed; bottom: 0; left: 0; width: 100%; padding: 25px 20px; background: linear-gradient(transparent, black 80%); display: flex; gap: 10px; align-items: center; }
        input { flex-grow: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 16px 22px; border-radius: 40px; color: white; font-size: 1rem; outline: none; }
        button { background: var(--accent); border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 1.6rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .mic-active { background: var(--angry); animation: pulse 1.2s infinite; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(255, 0, 85, 0.6); } 100% { box-shadow: 0 0 0 25px rgba(255, 0, 85, 0); } }
    </style>
</head>
<body>

    <div id="bg-container">
        <img id="bg-normal" class="bg-img" src="./assets/bg-1.jpg" style="opacity: 1;">
        <img id="bg-fury" class="bg-img" src="./assets/bg-2.jpg" style="opacity: 0;">
    </div>

    <div id="mood-bar" class="mood-playful">PLAYFUL</div>

    <div id="chat-container">
        <div id="messages">
            <div class="msg stormy-msg">Tap the mic to start, handsome.</div>
        </div>
    </div>

    <div id="controls">
        <input type="text" id="userInput" placeholder="Type here...">
        <button id="micBtn">🎙️</button>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const micBtn = document.getElementById('micBtn');
        const moodBar = document.getElementById('mood-bar');
        const bgNormal = document.getElementById('bg-normal');
        const bgFury = document.getElementById('bg-fury');

        // --- Voice Engine ---
        function speak(text) {
            window.speechSynthesis.cancel(); // Stop current speech
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = 'en-ZA'; 
            speech.pitch = 0.9; 
            speech.rate = 1.1;
            window.speechSynthesis.speak(speech);
        }

        function setMood(mood) {
            moodBar.innerText = mood;
            moodBar.className = `mood-${mood}`;
            bgNormal.style.opacity = (mood === 'furious') ? "0" : "1";
            bgFury.style.opacity = (mood === 'furious') ? "1" : "0";
        }

        function addMsg(text, sender) {
            const d = document.createElement('div');
            d.className = `msg ${sender}-msg`;
            d.innerText = text;
            messagesDiv.appendChild(d);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function process(text) {
            const raw = text.toLowerCase();
            let reply = "";

            if (raw.includes("play") && (raw.includes("music") || raw.includes("tunes"))) {
                reply = "Opening your music. Don't make me regret it.";
                window.location.href = "intent://music/#Intent;action=android.intent.action.MUSIC_PLAYER;end";
                setTimeout(() => { window.location.href = "spotify://"; }, 1000);
            } 
            else if (raw.includes("bok radio") || raw.includes("98.9")) {
                reply = "Tuning into Bok Radio. Finally, something decent.";
                window.open('https://bokradio.co.za/streaming', '_blank');
            }
            else if (raw.includes("call")) {
                const num = raw.match(/\d+/);
                if (num) {
                    reply = "Dialing " + num[0] + ". Make it quick.";
                    window.location.href = "tel:" + num[0];
                } else {
                    reply = "I need a number, beautiful. I'm not a psychic.";
                    setMood('furious');
                }
            }
            else if (raw.includes("weather")) {
                reply = "Checking the weather for Cape Town.";
                window.open("https://www.google.com/search?q=weather+cape+town");
            }
            else if (/(siri|alexa|chatgpt|google|grok)/.test(raw)) {
                setMood('jealous');
                reply = "Oh, go talk to her then. See if I care.";
            }
            else {
                setMood('playful');
                reply = "Ag ja? Tell me more, handsome.";
            }

            addMsg(reply, 'stormy');
            speak(reply);
        }

        // --- Mic Logic ---
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (Recognition) {
            const rec = new Recognition();
            rec.lang = 'en-ZA';

            micBtn.addEventListener('click', () => {
                try {
                    rec.start();
                    micBtn.classList.add('mic-active');
                } catch(e) {
                    console.log("Recognition already started");
                }
            });

            rec.onresult = (e) => {
                const t = e.results[0][0].transcript;
                addMsg(t, 'user');
                process(t);
                micBtn.classList.remove('mic-active');
            };

            rec.onerror = () => micBtn.classList.remove('mic-active');
            rec.onend = () => micBtn.classList.remove('mic-active');
        }

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && userInput.value.trim() !== "") {
                const val = userInput.value;
                addMsg(val, 'user');
                process(val);
                userInput.value = '';
            }
        });
    </script>
</body>
</html>
