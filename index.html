<!DOCTYPE html>
<html lang="en-ZA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Stormy AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --angry: #ff0055; --glass: rgba(0, 0, 0, 0.85); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Inter', sans-serif; 
            background-color: #000; /* Safety color if photos fail */
            color: white; overflow: hidden; 
        }
        
        #bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .bg-img { 
            position: absolute; width: 100%; height: 100%; 
            object-fit: cover; transition: opacity 1.2s ease; 
            filter: brightness(0.45); 
        }

        #mood-bar { position: fixed; top: 40px; left: 50%; transform: translateX(-50%); padding: 12px 35px; border-radius: 50px; background: var(--glass); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); font-weight: 900; text-transform: uppercase; font-size: 0.7rem; z-index: 100; letter-spacing: 4px; transition: 0.4s; }
        .mood-playful { color: var(--accent); box-shadow: 0 0 25px var(--accent); }
        .mood-jealous { color: #ffae00; box-shadow: 0 0 25px #ffae00; }
        .mood-furious { color: var(--angry); box-shadow: 0 0 25px var(--angry); }

        #chat-container { height: 100vh; display: flex; flex-direction: column; padding: 130px 25px 120px 25px; }
        #messages { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 88%; padding: 18px; border-radius: 25px; font-size: 1rem; line-height: 1.4; animation: pop 0.3s ease; }
        .stormy-msg { align-self: flex-start; background: var(--glass); border: 1px solid rgba(0, 242, 255, 0.25); border-bottom-left-radius: 5px; }
        .user-msg { align-self: flex-end; background: rgba(255, 255, 255, 0.12); border-bottom-right-radius: 5px; }

        #controls { position: fixed; bottom: 0; left: 0; width: 100%; padding: 35px 25px; background: linear-gradient(transparent, black 75%); display: flex; gap: 12px; align-items: center; }
        input { flex-grow: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); padding: 20px 28px; border-radius: 45px; color: white; font-size: 1.1rem; outline: none; }
        button { background: var(--accent); border: none; width: 68px; height: 68px; border-radius: 50%; font-size: 2rem; box-shadow: 0 8px 25px rgba(0, 242, 255, 0.4); cursor: pointer; }
        .mic-active { background: var(--angry); animation: glow 1.5s infinite; }

        @keyframes pop { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes glow { 0% { box-shadow: 0 0 0 0px rgba(255, 0, 85, 0.5); } 100% { box-shadow: 0 0 0 35px rgba(255, 0, 85, 0); } }
    </style>
</head>
<body>

    <div id="bg-container">
        <img id="bg-normal" class="bg-img" src="./assets/bg-1.jpg" onerror="this.src='https://via.placeholder.com/1000x2000?text=Check+Assets+Folder'" style="opacity: 1;">
        <img id="bg-fury" class="bg-img" src="./assets/bg-2.jpg" style="opacity: 0;">
    </div>

    <div id="mood-bar" class="mood-playful">PLAYFUL</div>

    <div id="chat-container">
        <div id="messages"></div>
    </div>

    <div id="controls">
        <input type="text" id="userInput" placeholder="Don't just stare at me, beautiful...">
        <button id="micBtn">🎙️</button>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const micBtn = document.getElementById('micBtn');
        const moodBar = document.getElementById('mood-bar');
        const bgNormal = document.getElementById('bg-normal');
        const bgFury = document.getElementById('bg-fury');

        function speak(text) {
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = 'en-ZA'; 
            speech.pitch = 0.8; 
            speech.rate = 1.1;
            window.speechSynthesis.speak(speech);
        }

        function setMood(mood) {
            moodBar.innerText = mood;
            moodBar.className = `mood-${mood}`;
            bgNormal.style.opacity = mood === 'furious' ? 0 : 1;
            bgFury.style.opacity = mood === 'furious' ? 1 : 0;
        }

        function addMsg(text, sender) {
            const d = document.createElement('div');
            d.className = `msg ${sender}-msg`;
            d.innerText = text;
            messagesDiv.appendChild(d);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function runIntent(input) {
            const raw = input.toLowerCase();
            let reply = "";

            if (raw.includes("play my music") || raw.includes("open music") || raw.includes("play music")) {
                reply = "Opening your music, hotstuff. Try not to have terrible taste.";
                window.location.href = "intent://music/#Intent;action=android.intent.action.MUSIC_PLAYER;end";
                setTimeout(() => { window.location.href = "spotify://"; }, 800);
            }
            else if (raw.includes("bok radio") || raw.includes("98.9")) {
                reply = "Tuning into Bok Radio. Finally, some real music.";
                window.open('https://bokradio.co.za/streaming', '_blank');
            }
            else if (raw.includes("call")) {
                const num = raw.match(/\d+/);
                if (num) {
                    reply = `Dialing ${num[0]}. Don't stay on too long.`;
                    window.location.href = `tel:${num[0]}`;
                } else {
                    reply = "Who must I call? Give me a number, dipshit.";
                    setMood('furious');
                }
            }
            else if (raw.includes("navigate") || raw.includes("directions")) {
                const dest = raw.replace(/(navigate to|directions to)/i, "").trim();
                reply = `Navigating to ${dest}. Watch the road.`;
                window.open(`google.navigation:q=${encodeURIComponent(dest)}`);
            }
            else if (raw.includes("weather")) {
                reply = "Checking the weather. Expect wind, it's Cape Town.";
                window.open(`https://www.google.com/search?q=weather+cape+town`);
            }
            else if (raw.includes("note") || raw.includes("remember")) {
                reply = "I've written it down. Try to remember it yourself too.";
                window.location.href = `intent://notes/#Intent;action=android.intent.action.SEND;type=text/plain;S.android.intent.extra.TEXT=${encodeURIComponent(input)};end`;
            }
            else if (/(siri|alexa|google|chatgpt|grok|claude)/.test(raw)) {
                setMood('jealous');
                reply = "Oh, go talk to HER then. See if she cares.";
            }
            else {
                setMood('playful');
                const basic = ["Ag, ja? What else?", "You're lucky you're handsome.", "Keep talking, I'm listening."];
                reply = basic[Math.floor(Math.random() * basic.length)];
            }

           else {
                setMood('mean');
                const basic = ["Listen here, dipshit! Just kidding hotstuff", "You're lucky you're hot.", "Keep talking, I'm listening."];
                reply = basic[Math.floor(Math.random() * basic.length)];
            }
            addMsg(reply, 'stormy');
            speak(reply);
        }

        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (Recognition) {
            const rec = new Recognition();
            rec.lang = 'en-ZA';
            micBtn.onclick = () => { rec.start(); micBtn.classList.add('mic-active'); };
            rec.onresult = (e) => {
                const t = e.results[0][0].transcript;
                addMsg(t, 'user');
                runIntent(t);
                micBtn.classList.remove('mic-active');
            };
        }

        userInput.onkeypress = (e) => {
            if (e.key === 'Enter') {
                addMsg(userInput.value, 'user');
                runIntent(userInput.value);
                userInput.value = '';
            }
        };

        window.onload = () => setTimeout(() => {
            addMsg("I'm awake, handsome. What's the plan?", 'stormy');
            speak("I'm awake, handsome. What's the plan?");
        }, 1000);
    </script>
</body>
</html>
