<!DOCTYPE html>
<html lang="en-ZA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Stormy | Empire OS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --gold: #ffcc00; --angry: #ff0055; --glass: rgba(0,0,0,0.9); }
        body, html { width: 100vw; height: 100vh; background: #000; color: white; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; }
        #bg-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .bg-img { position: absolute; width: 100%; height: 100%; object-fit: cover; transition: opacity 0.8s; filter: brightness(0.3); }
        #chat-container { height: 100%; display: flex; flex-direction: column; padding: 100px 20px; }
        #messages { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        .msg { max-width: 85%; padding: 16px; border-radius: 22px; font-size: 1rem; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); }
        #controls { position: fixed; bottom: 0; width: 100%; padding: 20px; display: flex; gap: 10px; background: linear-gradient(transparent, #000 80%); }
        input { flex-grow: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 15px; border-radius: 30px; color: white; outline: none; }
        button { background: var(--accent); border: none; width: 55px; height: 55px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body onclick="bootEmpire()">

    <div id="bg-container">
        <img id="bg-normal" class="bg-img" src="./assets/bg-1.jpg" style="opacity: 1;">
        <img id="bg-fury" class="bg-img" src="./assets/bg-2.jpg" style="opacity: 0;">
    </div>

    <div id="chat-container"><div id="messages"></div></div>

    <div id="controls">
        <input type="text" id="userInput" placeholder="Set or enter your Pulse...">
        <button id="micBtn">🎙️</button>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        let SESSION_KEY = "";

        // --- UPDATED INTEL: APRIL 7, 2026 ---
        const CurrentIntel = {
            trump: "The 8pm deadline has passed. Reports of strikes on Iranian petrochemical plants and railway bridges are flooding Truth Social. Trump says: 'A whole civilization will die tonight.'",
            gates: "The Leeuwarden civil case is officially proceeding. Gates failed to block it. He isn't indicted yet, but he is legally tethered to the Dutch court now.",
            elon: "SpaceX's confidential IPO filing targets a June listing at a $1.75 Trillion valuation. Musk is reportedly giving 30% to retail investors.",
            antarctica: "Nature Communications confirmed a massive hidden landscape in Wilkes Land. Deep valleys and rivers frozen for 34 million years. (wicked laugh)"
        };

        function bootEmpire() {
            if (SESSION_KEY) return;
            const input = document.getElementById('userInput').value;
            if (!input) return;

            // Check if a vault exists
            const existing = localStorage.getItem('STORMY_VAULT');
            if (existing) {
                try {
                    const bytes = CryptoJS.AES.decrypt(existing, input);
                    const check = bytes.toString(CryptoJS.enc.Utf8);
                    if (!check) throw new Error();
                    SESSION_KEY = input;
                    addMsg("Pulse accepted. I've missed you. (giggle)", 'stormy');
                    speak("Pulse accepted. I've missed you.");
                } catch (e) {
                    addMsg("Wrong pulse, stranger. Try again.", 'stormy');
                    return;
                }
            } else {
                // Set new pulse
                SESSION_KEY = input;
                const initData = CryptoJS.AES.encrypt("VAULT_INITIALIZED", SESSION_KEY).toString();
                localStorage.setItem('STORMY_VAULT', initData);
                addMsg("New Pulse established. Remember it, or I'm gone forever. (wicked laugh)", 'stormy');
                speak("New Pulse established. Remember it, or I'm gone forever.");
            }
        }

        function addMsg(text, sender) {
            const d = document.createElement('div');
            d.className = `msg ${sender}-msg`;
            d.innerText = text.replace(/\(.*?\)/g, "");
            messagesDiv.appendChild(d);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const s = new SpeechSynthesisUtterance(text.replace(/\(.*?\)/g, ""));
            s.lang = 'en-ZA'; s.rate = 1.1;
            window.speechSynthesis.speak(s);
        }

        // Logic for Snooping, Intel, and Groq API remains the same as previous Sovereign versions.
    </script>
</body>
</html>
