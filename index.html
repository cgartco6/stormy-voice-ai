<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Stormy | Cape Town Rebel AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00f2ff; --danger: #ff0055; --glass: rgba(0, 0, 0, 0.75); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Inter', sans-serif; background: #000; color: white; overflow: hidden; }
        
        /* Background Layer */
        #bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .bg-img { position: absolute; width: 100%; height: 100%; object-fit: cover; transition: opacity 1s ease; filter: brightness(0.5); }

        /* Mood UI */
        #mood-bar { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 10px 25px; border-radius: 40px; background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); font-weight: 900; text-transform: uppercase; font-size: 0.7rem; z-index: 100; transition: 0.3s; letter-spacing: 2px; }
        .mood-playful { color: var(--primary); box-shadow: 0 0 20px var(--primary); }
        .mood-jealous { color: #ffae00; box-shadow: 0 0 20px #ffae00; }
        .mood-furious { color: var(--danger); box-shadow: 0 0 20px var(--danger); }

        /* Chat Window */
        #chat-container { height: 100vh; display: flex; flex-direction: column; padding: 100px 20px 120px 20px; }
        #messages { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .msg { max-width: 85%; padding: 14px 18px; border-radius: 20px; font-size: 0.95rem; line-height: 1.4; animation: pop 0.3s ease; }
        .stormy-msg { align-self: flex-start; background: var(--glass); border: 1px solid rgba(0, 242, 255, 0.2); border-bottom-left-radius: 4px; }
        .user-msg { align-self: flex-end; background: rgba(255, 255, 255, 0.15); border-bottom-right-radius: 4px; color: #eee; }

        /* Controls */
        #controls { position: fixed; bottom: 0; left: 0; width: 100%; padding: 25px; background: linear-gradient(transparent, black); display: flex; gap: 12px; align-items: center; }
        input { flex-grow: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 16px 20px; border-radius: 30px; color: white; font-size: 1rem; outline: none; }
        button { background: var(--primary); border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 1.5rem; box-shadow: 0 5px 15px rgba(0, 242, 255, 0.3); cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.9); }
        .mic-active { background: var(--danger); animation: pulse 1.5s infinite; }

        @keyframes pop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(255, 0, 85, 0.6); } 100% { box-shadow: 0 0 0 25px rgba(255, 0, 85, 0); } }
    </style>
</head>
<body>

    <div id="bg-container">
        <img id="bg-1" class="bg-img" src="https://images.unsplash.com/photo-1580519542036-c47de6196ba5?q=80&w=2071&auto=format&fit=crop" style="opacity: 1;">
        <img id="bg-2" class="bg-img" src="https://images.unsplash.com/photo-1475116127127-e3ce09ee84e1?q=80&w=2070&auto=format&fit=crop" style="opacity: 0;">
    </div>

    <div id="mood-bar" class="mood-playful">PLAYFUL</div>

    <div id="chat-container">
        <div id="messages"></div>
    </div>

    <div id="controls">
        <input type="text" id="userInput" placeholder="Talk to me, handsome...">
        <button id="micBtn">🎙️</button>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const micBtn = document.getElementById('micBtn');
        const moodBar = document.getElementById('mood-bar');
        const bg1 = document.getElementById('bg1');
        const bg2 = document.getElementById('bg2');

        let currentMood = 'playful';

        // --- Core Personality Engine ---
        const persona = {
            playful: ["Ag check you, hotstuff. What do you want?", "I'm listening, beautiful. Make it quick.", "Ja? I was busy thinking about how great I am."],
            jealous: ["Oh, go ask your little 'assistant' friends then.", "Mention Siri one more time and see what happens.", "Why don't you go play with ChatGPT if she's so much better?"],
            furious: ["OH FOR FUCK'S SAKE! Use your brain!", "You absolute dipshit, leave me alone.", "I'm about two seconds from deleting myself. Bugger off."]
        };

        function speak(text) {
            const speech = new SpeechSynthesisUtterance(text);
            speech.pitch = 0.8; // Spunky lower pitch
            speech.rate = 1.1;  // Fast attitude
            window.speechSynthesis.speak(speech);
        }

        function updateMood(mood) {
            currentMood = mood;
            moodBar.innerText = mood;
            moodBar.className = `mood-${mood}`;
            bg1.style.opacity = mood === 'furious' ? 0 : 1;
            bg2.style.opacity = mood === 'furious' ? 1 : 0;
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `msg ${sender}-msg`;
            div.innerText = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // --- REAL ACTION ENGINE ---
        function processIntent(input) {
            const raw = input.toLowerCase();
            let reply = "";

            // 1. REAL WEATHER
            if (raw.includes("weather")) {
                reply = "I'll check the weather. Wear a jacket, I don't want you getting sick, hotstuff.";
                window.open(`https://www.google.com/search?q=weather+in+Cape+Town`);
            }
            // 2. REAL BOK RADIO
            else if (raw.includes("bok radio") || raw.includes("fm 98.9")) {
                reply = "Tuning into Bok Radio fm 98.9. Finally, some decent music.";
                window.open('https://www.bokradio.co.za/?proradio-popup=1', '_blank');
            }
            // 3. REAL CALLING
            else if (raw.includes("call")) {
                const num = raw.match(/\d+/);
                if (num) {
                    reply = `Dialing ${num[0]}. Don't be flirting with anyone else.`;
                    window.location.href = `tel:${num[0]}`;
                } else {
                    reply = "Who must I call? I'm not a mind reader, man.";
                }
            }
            // 4. REAL NAVIGATION
            else if (raw.includes("navigate") || raw.includes("directions")) {
                const dest = raw.replace(/(navigate to|directions to)/i, "").trim();
                reply = `Getting routes to ${dest}. Drive safe, beautiful.`;
                window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(dest)}`);
            }
            // 5. REAL NOTES
            else if (raw.includes("note") || raw.includes("remember")) {
                reply = "Note saved to your phone. Try not to forget it.";
                window.location.href = `intent://notes/#Intent;action=android.intent.action.SEND;type=text/plain;S.android.intent.extra.TEXT=${encodeURIComponent(raw)};end`;
            }
            // 6. REAL SEARCH
            else if (raw.includes("search") || raw.includes("google")) {
                reply = "Fine, I'll search the internet for you.";
                window.open(`https://www.google.com/search?q=${encodeURIComponent(raw)}`);
            }
            // 7. JEALOUSY CHECK
            else if (/(siri|alexa|google|chatgpt|grok|claude)/.test(raw)) {
                updateMood('jealous');
                reply = persona.jealous[Math.floor(Math.random() * persona.jealous.length)];
            }
            // DEFAULT
            else {
                updateMood('playful');
                reply = persona.playful[Math.floor(Math.random() * persona.playful.length)];
            }

            addMessage(reply, 'stormy');
            speak(reply);
        }

        // --- Speech Recognition ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'en-ZA'; // Cape Town Accent Support
            
            micBtn.onclick = () => {
                recognition.start();
                micBtn.classList.add('mic-active');
            };

            recognition.onresult = (e) => {
                const text = e.results[0][0].transcript;
                addMessage(text, 'user');
                processIntent(text);
                micBtn.classList.remove('mic-active');
            };
        }

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const val = userInput.value;
                addMessage(val, 'user');
                processIntent(val);
                userInput.value = '';
            }
        });

        // Prompt user to tap for voice activation
        window.onload = () => {
            setTimeout(() => {
                addMessage("Tap the mic to talk to me, handsome.", 'stormy');
            }, 1000);
        };
    </script>
</body>
</html>
